name: Release candidate

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: release-candidate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  repository-controls:
    name: Candidate head and repository controls
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out exact candidate head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Assert exact candidate head
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"

      - name: Verify candidate workflow coverage
        run: npm run check:release-workflow

      - name: Verify environment examples
        run: npm run check:env-examples

      - name: Verify support privacy controls
        run: npm run audit:support-privacy

  frontend:
    name: Frontend tests, lint, build, and audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out exact candidate head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Assert exact candidate head
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22.13.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Run frontend lint
        run: npm run lint

      - name: Build production frontend
        run: |
          set -a
          source .env.example
          set +a
          npm run build

      - name: Audit runtime dependencies
        run: npm audit --omit=dev --audit-level=high

  backend:
    name: Backend tests, contracts, and audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Check out exact candidate head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Assert exact candidate head
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Verify dependency consistency
        run: python -m pip check

      - name: Verify hash-pinned dependency locks
        run: |
          python -m piptools compile --quiet --generate-hashes --strip-extras --output-file requirements.txt requirements.in
          python -m piptools compile --quiet --generate-hashes --strip-extras --allow-unsafe --output-file requirements-dev.txt requirements-dev.in
          git diff --exit-code -- requirements.txt requirements-dev.txt

      - name: Audit backend dependencies
        run: python -m pip_audit -r requirements.txt

      - name: Run backend tests
        run: python -m pytest tests

      - name: Verify generated API contracts
        run: python ../scripts/generate-api-types.py --check

  database:
    name: Supabase migration and contract suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out exact candidate head
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Assert exact candidate head
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1
        with:
          version: 2.95.4

      - name: Start disposable database
        run: supabase db start

      - name: Replay repository migrations
        run: supabase db reset --local

      - name: Lint database schema
        run: supabase db lint --local --fail-on error

      - name: Run database contracts
        env:
          SUPABASE_DB_TARGET: local
        run: scripts/verify-supabase-contracts.sh

      - name: Stop disposable database
        if: ${{ always() }}
        run: supabase stop --no-backup

  static-analysis:
    name: Static and secret analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out exact candidate head and history
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Assert exact candidate head
        env:
          EXPECTED_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: test "$(git rev-parse HEAD)" = "$EXPECTED_HEAD_SHA"

      - name: Scan repository history for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: 8.27.2

      - name: Scan every reachable commit and exact-head worktree
        run: |
          gitleaks git --redact --verbose --exit-code 1 --log-opts="--all"
          gitleaks dir . --redact --verbose --exit-code 1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript,python

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install security tooling
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Run Bandit
        run: python -m bandit -r backend/app -ll

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4

  release-candidate:
    name: Release candidate gate
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - repository-controls
      - frontend
      - backend
      - database
      - static-analysis

    steps:
      - name: Require every candidate suite
        env:
          REPOSITORY_RESULT: ${{ needs.repository-controls.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          DATABASE_RESULT: ${{ needs.database.result }}
          STATIC_ANALYSIS_RESULT: ${{ needs.static-analysis.result }}
        run: |
          test "$REPOSITORY_RESULT" = success
          test "$FRONTEND_RESULT" = success
          test "$BACKEND_RESULT" = success
          test "$DATABASE_RESULT" = success
          test "$STATIC_ANALYSIS_RESULT" = success

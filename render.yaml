services:
  - type: web
    name: koaryu
    runtime: python
    plan: starter
    region: ohio
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: FRONTEND_URL
        value: https://koaryu.app
      - key: ENVIRONMENT
        value: production
      - key: API_V1_PREFIX
        value: /api/v1
      - key: DEMO_RESET_ENABLED
        value: "false"
      - key: DEMO_RESET_STUDIO_IDS
        value: ""
      - key: BILLING_PLATFORM_FEE_BPS
        value: "50"
      - key: SUPABASE_URL
        value: https://mimguepumzsgmcaycdsh.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_RESTRICTED_KEY
        sync: false
      - key: STRIPE_PLATFORM_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CONNECT_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_KOARYU_CORE_PRICE_ID
        sync: false
      - key: STRIPE_CONNECT_CLIENT_ID
        sync: false
      - key: ACCOUNT_DELETION_WORKER_SECRET
        sync: false
      - key: SUPPORT_TRIAGE_SECRET
        sync: false

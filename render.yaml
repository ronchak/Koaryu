services:
  - type: web
    name: koaryu
    runtime: python
    plan: free
    region: ohio
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: FRONTEND_URL
        value: https://koaryu.app
      - key: ENVIRONMENT
        value: production
      - key: API_V1_PREFIX
        value: /api/v1
      - key: DEMO_RESET_ENABLED
        value: "false"
      - key: BILLING_PLATFORM_FEE_BPS
        value: "50"
      - key: SUPABASE_URL
        value: https://mimguepumzsgmcaycdsh.supabase.co
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_RESTRICTED_KEY
        sync: false
      - key: STRIPE_PLATFORM_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CONNECT_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_KOARYU_CORE_PRICE_ID
        sync: false
      - key: STRIPE_CONNECT_CLIENT_ID
        sync: false
